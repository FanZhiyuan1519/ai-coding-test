version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: bid_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai-coding}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai-coding}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bid_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai-coding}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_MODEL_URL: ${AI_MODEL_URL:-http://10.3.75.113:1002/v1/chat/completions}
      AI_MODEL_PROVIDER: ${AI_MODEL_PROVIDER:-openai}
      AI_MODEL_ID: ${AI_MODEL_ID:-qwen3.5-35b-a3b-4bit}
      AI_API_KEY: ${AI_API_KEY:-}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"

volumes:
  pg_data:
